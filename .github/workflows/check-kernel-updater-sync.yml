name: Check kernel-updater script is in sync with tracked sources

on:
  push:
    paths:
      - 'scripts/nuc16pro-kernel-updater.sh'
      - 'scripts/nuc16pro-kernel-updater.sh.in'
      - 'scripts/assemble-kernel-updater.sh'
      - 'modprobe.d/**'
      - 'sysctl.d/**'
      - 'udev/**'
      - 'systemd/**'
  pull_request:
    paths:
      - 'scripts/nuc16pro-kernel-updater.sh'
      - 'scripts/nuc16pro-kernel-updater.sh.in'
      - 'scripts/assemble-kernel-updater.sh'
      - 'modprobe.d/**'
      - 'sysctl.d/**'
      - 'udev/**'
      - 'systemd/**'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  sync-check:
    name: Regenerate scripts/nuc16pro-kernel-updater.sh and diff
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3

      - name: Regenerate from tracked sources
        run: bash scripts/assemble-kernel-updater.sh

      - name: Fail if regenerated output differs from committed file
        run: |
          if ! git diff --exit-code -- scripts/nuc16pro-kernel-updater.sh; then
            echo "::error::scripts/nuc16pro-kernel-updater.sh is out of sync with its sources (scripts/nuc16pro-kernel-updater.sh.in, modprobe.d/, sysctl.d/, udev/, systemd/). Edit the sources and re-run scripts/assemble-kernel-updater.sh, then commit the result."
            exit 1
          fi
          echo "in sync"
